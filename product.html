<!DOCTYPE html>
<html>
<head>
<title>Medicine UI Section</title>
<style>

*{
  font-family:Arial, sans-serif;
  box-sizing:border-box;
}

body{
  background:#f1f1f1;
  padding:40px;
}

/* MAIN BOX */
.main-box{
  background:#fff;
  border-radius:25px;
  padding:25px;
  display:grid;
  grid-template-columns:1.5fr 1fr;
  gap:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* LEFT SIDE */
.left-box h3{
  font-size:20px;
  margin-bottom:5px;
}

.left-box p{
  font-size:14px;
  color:#666;
}

.btn{
  display:block;
  width:250px;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:30px;
  background:#6e00ff;
  color:#fff;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(110,0,255,.4);
}

.btn.outline{
  background:#fff;
  color:#6e00ff;
  border:2px solid #6e00ff;
}

/* RIGHT CARDS */
.right-cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

/* CARD */
.card{
  background:#f5efff;
  padding:18px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 5px 15px rgba(110,0,255,.15);
  transition:.3s;
  border:1px solid rgba(110,0,255,.2);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 30px rgba(110,0,255,.35);
}

/* ICON */
.card img{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#6e00ff;
  padding:8px;
  margin-bottom:10px;
}

/* BIG % TEXT */
.big{
  font-size:36px;
  font-weight:bold;
  color:#e10000;
}

.card h4{
  color:#6e00ff;
  font-size:16px;
  margin:5px 0;
}

.card p{
  font-size:13px;
  color:#333;
}

</style>
</head>

<body>

<div class="main-box">

  <!-- LEFT SIDE -->
  <div class="left-box">
    <h3>Order with Prescription</h3>
    <p>Upload prescription and we will deliver your medicines</p>

    <button class="btn">Upload Now</button>
    <button class="btn">Re Order Previous Medicines</button>

    <button class="btn outline">Request Callback</button>
  </div>

  <!-- RIGHT SIDE 3 CARDS -->
  <div class="right-cards">

    <!-- CARD 1 -->
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
      <div class="big">21%</div>
      <h4>Save Up To</h4>
      <p>On Genuine Medicines</p>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/2972/2972528.png">
      <div class="big">71%</div>
      <h4>Save Up To</h4>
      <p>On Substitutes</p>
    </div>

    <!-- CARD 3 -->
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
      <h4>SMART BUYER</h4>
      <p>Always Prefer Substitute</p>
    </div>

  </div>

</div>

</body>
</html>
