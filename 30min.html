<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Medicine Hero Banner</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  background:#f4f1ff;
  font-family:Inter, system-ui, sans-serif;
  padding:30px;
}

/* MAIN BANNER */
.hero-banner{
  background:linear-gradient(135deg,#5c00d6,#6e00ff,#9a00ff);
  border-radius:22px;
  padding:40px 50px;
  color:white;
  position:relative;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(110,0,255,.45);

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:40px;
}

/* Glow circles */
.hero-banner::before{
  content:"";
  position:absolute;
  right:-100px;
  top:-100px;
  width:300px;
  height:300px;
  background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);
}
.hero-banner::after{
  content:"";
  position:absolute;
  left:-120px;
  bottom:-120px;
  width:320px;
  height:320px;
  background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);
}

/* LEFT CONTENT */
.hero-content{
  max-width:60%;
  z-index:2;
}

/* Badge */
.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,.15);
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:600;
}

/* Title */
.hero-title{
  font-size:30px;
  font-weight:700;
  margin:18px 0 10px;
  max-width:600px;
}

/* Subtitle */
.hero-sub{
  font-size:15px;
  font-weight:500;
  opacity:.9;
  margin-bottom:30px;
}

/* Features */
.hero-features{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  font-size:14px;
  font-weight:500;
}
.feature-item{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,.12);
  padding:10px 14px;
  border-radius:14px;
}
.feature-item i{
  font-size:18px;
  opacity:.9;
}

/* RIGHT IMAGE */
.hero-image{
  max-width:40%;
  z-index:2;
}
.hero-image img{
  width:100%;
  max-height:320px;
  object-fit:contain;
  filter:drop-shadow(0 15px 30px rgba(0,0,0,.25));
}

/* RESPONSIVE */
@media(max-width:768px){
  body{padding:15px;}
  .hero-banner{
    flex-direction:column;
    text-align:center;
    padding:30px 25px;
  }
  .hero-content,
  .hero-image{
    max-width:100%;
  }
  .hero-title{font-size:22px;}
  .hero-features{gap:12px; justify-content:center;}
  .hero-image img{
    max-height:240px;
    margin-top:20px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="hero-banner">

    <!-- LEFT TEXT -->
    <div class="hero-content">
      <div class="hero-badge">
        <i class="bi bi-shield-check"></i> 100% Genuine Products
      </div>

      <h1 class="hero-title">
        Get Your Medicines & Health Care Products in Minutes
      </h1>

      <div class="hero-sub">
        ⚡ Super-fast medicine delivery at your doorstep
      </div>

      <div class="hero-features">
        <div class="feature-item">
          <i class="bi bi-clock"></i> 30 Min Delivery
        </div>
        <div class="feature-item">
          <i class="bi bi-patch-check"></i> Verified Medicines
        </div>
        <div class="feature-item">
          <i class="bi bi-truck"></i> Free Delivery on ₹500+
        </div>
      </div>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="hero-image">
      <img src="delivery-man-deliver-medicine-order-illustration-svg-download-png-8778527.webp" alt="Medicine Delivery">
    </div>

  </div>
</div>

</body>
</html>
