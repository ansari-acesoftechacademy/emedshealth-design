<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayurveda Top Brands</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Swiper -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
body{
  background:#ffffff;
  font-family: Inter, system-ui, sans-serif;
}

.brand-section{
  padding:30px 0;
}

.section-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.section-head h5{
  font-weight:600;
  margin:0;
}

.section-head a{
  font-size:14px;
  color:#6e00ff;                /* link color updated */
  text-decoration:none;
  font-weight:500;
}

/* brand card */
.brand-card{
  height:110px;
  border-radius:10px;
  border:1px solid #eef1f5;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  transition:.25s;
}

.brand-card:hover{
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.brand-card img{
  max-width:80%;
  max-height:60px;
  object-fit:contain;
}

/* arrows - new background & icon color */
.brandSwiper .swiper-button-next,
.brandSwiper .swiper-button-prev{
  width:38px;
  height:38px;
  background:#6e00ff;           /* changed to #6e00ff */
  border-radius:50%;
  box-shadow:0 4px 14px rgba(0,0,0,.15);
}

.brandSwiper .swiper-button-next::after,
.brandSwiper .swiper-button-prev::after{
  font-size:14px;
  color:#fff;                   /* white arrow */
}

/* hide arrows on mobile */
@media(max-width:576px){
  .brandSwiper .swiper-button-next,
  .brandSwiper .swiper-button-prev{
    display:none;
  }
}
</style>
</head>
<body>

<section class="brand-section">
<div class="container">

  <div class="section-head">
    <h5>Ayurveda top brands</h5>
    <a href="#">See all ›</a>
  </div>

  <div class="swiper brandSwiper">
    <div class="swiper-wrapper">

      <!-- Brand 1 -->
      <div class="swiper-slide">
        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Patanjali_logo.svg">
        </div>
      </div>

      <!-- Brand 2 -->
      <div class="swiper-slide">
        <div class="brand-card">
          <img src="https://www.baidhyanath.co.in/assets/images/logo.png">
        </div>
      </div>

      <!-- Brand 3 -->
      <div class="swiper-slide">
        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Tata_1mg_Logo.svg">
        </div>
      </div>

      <!-- Brand 4 -->
      <div class="swiper-slide">
        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Himalaya_Logo.svg">
        </div>
      </div>

      <!-- Brand 5 -->
      <div class="swiper-slide">
        <div class="brand-card">
          <img src="https://www.jiva.com/cdn/shop/files/Jiva_Ayurveda_Logo.png">
        </div>
      </div>

      <!-- Brand 6 -->
      <div class="swiper-slide">
        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/en/5/59/Kerala_Ayurveda_Logo.png">
        </div>
      </div>

      <!-- Brand 7 -->
      <div class="swiper-slide">
        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Sri_Sri_Tattva_logo.png">
        </div>
      </div>

      <!-- Brand 8 -->
      <div class="swiper-slide">
        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Zandu_Logo.svg">
        </div>
      </div>

    </div>

    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
  </div>

</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
new Swiper(".brandSwiper", {
  spaceBetween:14,
  speed:600,
  navigation:{
    nextEl:".swiper-button-next",
    prevEl:".swiper-button-prev",
  },
  breakpoints:{
    0:{ slidesPerView:2 },
    576:{ slidesPerView:3 },
    768:{ slidesPerView:4 },
    992:{ slidesPerView:6 },
    1200:{ slidesPerView:7 } // DESKTOP
  }
});
</script>

</body>
</html>
