<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>df</title>
	<style>
		:root {
    --primary: #00d2ff;
    --accent: #6a11cb;
    --bg-dark: #0f0c29;
    --glass: rgba(255, 255, 255, 0.1);
    --text: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    /*min-height: 100vh;*/
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0c29;
    color: var(--text);
    overflow: hidden;
}

/* Animasi Background Bulatan */
.bg-animate {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.circle {
    position: absolute;
    border-radius: 50%;
    background: linear-gradient(45deg, var(--accent), var(--primary));
    filter: blur(80px);
    animation: move 20s infinite alternate;
    opacity: 0.3;
}

@keyframes move {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(20%, 20%); }
}

/* Container Glassmorphism */
.container {
    width: 900px;
    height: 580px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    display: flex;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    animation: fadeIn 0.8s ease-out;
}

.mascot-section {
    flex: 1;
    background: rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
}

.mascot-container {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 20px;
}

.robot {
    width: 100%;
    height: 100%;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

.glow-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, transparent 70%);
}

.form-section {
    flex: 1.2;
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.form-toggle {
    display: flex;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 12px;
    margin-bottom: 30px;
    padding: 5px;
    width: fit-content;
}

.form-toggle button {
    padding: 10px 25px;
    border: none;
    background: transparent;
    color: #fff;
    cursor: pointer;
    border-radius: 10px;
    font-weight: 600;
    transition: 0.3s;
}

.form-toggle button.active {
    background: linear-gradient(45deg, var(--accent), var(--primary));
}

.form-box {
    display: none;
    animation: slideIn 0.4s forwards;
}

.form-box.active {
    display: block;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

h2 { font-size: 1.8rem; margin-bottom: 10px; }
.desc { font-size: 0.85rem; color: #ccc; margin-bottom: 25px; }

.input-group { margin-bottom: 15px; }
label { display: block; font-size: 0.75rem; margin-bottom: 5px; color: var(--primary); }

input {
    width: 100%;
    padding: 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    color: white;
    outline: none;
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
}

.btn-submit {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, var(--accent), var(--primary));
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

@media (max-width: 768px) {
    .container { flex-direction: column; height: auto; margin: 20px; }
    .mascot-section { display: none; }
}
	</style>
</head>
<body>
<div class="bg-animate">
    <div class="circle" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="circle" style="width: 300px; height: 300px; bottom: -50px; right: -50px; animation-delay: -5s;"></div>
</div>

<div class="container">
    <div class="mascot-section">
        <div class="glow-circle"></div>
        <div class="mascot-container">
            <svg class="robot" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="80" fill="none" stroke="#00d2ff" stroke-width="2" stroke-dasharray="10 5" />
                <rect x="60" y="70" width="80" height="60" rx="15" fill="#1a1a2e" stroke="#00d2ff" stroke-width="4" />
                <circle cx="85" cy="95" r="8" fill="#00d2ff">
                    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
                </circle>
                <circle cx="115" cy="95" r="8" fill="#00d2ff">
                    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
                </circle>
                <path d="M80 115 Q100 125 120 115" stroke="#00d2ff" stroke-width="3" fill="none" stroke-linecap="round" />
                <path d="M100 50 L100 70" stroke="#6a11cb" stroke-width="4" />
                <circle cx="100" cy="45" r="5" fill="#6a11cb" />
            </svg>
        </div>
        <h3>APP NAME</h3>
        <p class="mascot-subtitle">Descriptions</p>
    </div>

    <div class="form-section">
        <div class="form-toggle">
            <button id="btn-login" class="active">Login</button>
            <button id="btn-register">Register</button>
        </div>

        <div class="form-content">
            <div id="login-form" class="form-box active">
                <h2>Welcome Back!</h2>
                <p class="desc">Please enter your credentials to access your neural-link.</p>
                <form class="auth-form">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" placeholder="Enter username" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">Initialize Session</button>
                </form>
            </div>

            <div id="register-form" class="form-box">
                <h2>New Connection</h2>
                <p class="desc">Create your neural profile to start the journey.</p>
                <form class="auth-form">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Email Sync</label>
                        <input type="email" placeholder="name@neuro.link" required>
                    </div>
                    <div class="input-group">
                        <label>Secure Cipher</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">Create Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
	document.addEventListener('DOMContentLoaded', () => {
    const btnLogin = document.getElementById('btn-login');
    const btnRegister = document.getElementById('btn-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    const toggleForms = (show, hide, activeBtn, inactiveBtn) => {
        hide.classList.remove('active');
        show.classList.add('active');
        inactiveBtn.classList.remove('active');
        activeBtn.classList.add('active');
    };

    btnLogin.addEventListener('click', () => {
        toggleForms(loginForm, registerForm, btnLogin, btnRegister);
    });

    btnRegister.addEventListener('click', () => {
        toggleForms(registerForm, loginForm, btnRegister, btnLogin);
    });

    const forms = document.querySelectorAll('.auth-form');
    forms.forEach(form => {
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const action = form.parentElement.id === 'login-form' ? 'Login' : 'Registration';
            alert(`${action} successful! Neural-link sequence initialized.`);
        });
    });
});
</script>
</body>
</html>
